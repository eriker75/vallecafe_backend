services:
  postgres:
    container_name: terroir_postgres
    image: postgres:16-alpine
    restart: always
    environment:
      TZ: "${TZ:-America/Caracas}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - postgresdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_EXT_PORT:-5432}:5432"
    networks:
      - appnet

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
      platforms:
        - linux/amd64
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
    container_name: terroir_backend
    image: terroir_backend_prod
    restart: always
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      # DATABASE_URL takes priority; if not set in env_file, it's built from these parts:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_SCHEMA=${DB_SCHEMA:-public}
    volumes:
      - uploads:/usr/src/app/uploads
    tmpfs:
      - /usr/src/app/tmp:size=512m,noexec,nosuid
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  postgresdata:
    name: terroir-postgresdata
  uploads:
    name: terroir-uploads
